<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crack the Case | Convosight Visual Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #f6f5f1;
    --surface: #ffffff;
    --surface-2: #f0eeea;
    --surface-3: #e8e6e0;
    --accent: #1a7a5c;
    --accent-light: #1a7a5c12;
    --accent-mid: #1a7a5c22;
    --accent-bright: #22c88e;
    --red: #d94452;
    --red-light: #d9445210;
    --amber: #e8a817;
    --amber-light: #e8a81715;
    --text: #1a1a1f;
    --text-2: #4a4a55;
    --text-3: #8a8a98;
    --border: #e2e0da;
    --radius: 14px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
  }

  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased; }
  .container { max-width:520px;margin:0 auto;padding:20px 24px; }

  .global-logo { text-align:center;padding:28px 0 0; }
  .logo { height:40px; }
  .header { text-align:center;padding:24px 0 28px; }
  .header h1 { font-size:34px;font-weight:800;line-height:1.15;letter-spacing:-0.5px;margin-bottom:10px; }
  .header h1 .green { color:var(--accent); }
  .header p { color:var(--text-2);font-size:15px;line-height:1.55;font-weight:400;max-width:340px;margin:0 auto; }

  .track-select { display:flex;gap:12px;margin:28px 0 0; }
  .track-btn {
    flex:1;padding:22px 16px;border:1.5px solid var(--border);border-radius:var(--radius);
    background:var(--surface-2);color:var(--text);cursor:pointer;text-align:center;
    transition:all 0.25s cubic-bezier(.4,0,.2,1);font-family:'Outfit',sans-serif;
    position:relative;overflow:hidden;
  }
  .track-btn::before { content:'';position:absolute;inset:0;background:var(--accent-light);opacity:0;transition:opacity 0.25s; }
  .track-btn:hover::before { opacity:1; }
  .track-btn:hover { border-color:var(--accent);transform:translateY(-2px); }
  .track-btn.active { border-color:var(--accent);background:var(--accent-light); }
  .track-btn .emoji { font-size:30px;display:block;margin-bottom:8px;position:relative; }
  .track-btn .label { font-weight:700;font-size:16px;position:relative; }
  .track-btn .sub { font-size:12px;color:var(--text-3);margin-top:4px;font-weight:400;position:relative; }
  .track-btn-solo { max-width:100%; }

  .rules-box {
    background:transparent;border:none;border-radius:0;
    padding:20px 0;margin-top:20px;text-align:center;
  }
  .rules-box h4 { font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px; }
  .prize-row {
    display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0;
    border-bottom:1px solid var(--surface-3);font-size:13px;
  }
  .prize-row:last-child { border-bottom:none; }
  .prize-level {
    font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
    width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;
    background:var(--surface-2);color:var(--text-3);flex-shrink:0;
  }
  .prize-level.l5 { background:#ffd70025;color:#b8860b; }
  .prize-emoji { font-size:18px;flex-shrink:0; }
  .prize-name { font-weight:500;color:var(--text); }
  .prize-desc { font-size:11.5px;color:var(--text-3);font-weight:400; }

  .top-bar { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 2px; }
  .progress-bar { display:flex;gap:6px;flex:1;margin-right:16px; }
  .progress-pip { flex:1;height:5px;border-radius:99px;background:var(--surface-3);transition:background 0.4s,box-shadow 0.4s; }
  .progress-pip.done { background:var(--accent-bright);box-shadow:0 0 8px #22c88e40; }
  .progress-pip.wrong { background:var(--red); }
  .progress-pip.active { background:var(--amber);animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  .streak-pill {
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
    color:var(--accent);background:var(--accent-light);
    padding:5px 12px;border-radius:99px;white-space:nowrap;
  }

  .q-card {
    background:transparent;border:none;
    border-radius:0;padding:0;
    animation:fadeUp 0.45s cubic-bezier(.4,0,.2,1);
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .q-meta { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
  .q-num { font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:1px; }
  .diff-pills { display:flex;gap:4px; }
  .diff-pills span { width:8px;height:8px;border-radius:99px;background:var(--surface-3);transition:background 0.3s; }
  .diff-pills span.on { background:var(--amber); }

  .video-link-box {
    display:flex;align-items:center;gap:14px;background:var(--surface-2);border-radius:12px;
    padding:14px 16px;margin-bottom:18px;text-decoration:none;transition:all 0.2s;border:1px solid var(--surface-3);
  }
  .video-link-box:hover { border-color:var(--accent);background:var(--accent-light); }
  .play-circle {
    width:42px;height:42px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px #1a7a5c30;
  }
  .play-circle svg { fill:white;width:16px;height:16px;margin-left:2px; }
  .video-link-text .vlt-title { font-weight:600;font-size:14px;color:var(--text); }
  .video-link-text .vlt-sub { font-size:11.5px;color:var(--text-3);margin-top:2px; }

  .q-card h3 { font-size:17px;font-weight:600;line-height:1.5;margin-bottom:18px;color:var(--text); }

  .options { display:flex;flex-direction:column;gap:10px; }
  .opt-btn {
    width:100%;padding:14px 16px;border:1.5px solid var(--surface-3);border-radius:12px;
    background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;
    font-size:14.5px;font-weight:500;text-align:left;cursor:pointer;
    transition:all 0.2s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:12px;line-height:1.45;
  }
  .opt-btn:hover:not(.answered) { border-color:var(--accent);background:var(--accent-light);transform:translateY(-1px);box-shadow:var(--shadow-sm); }
  .opt-letter {
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    background:var(--surface-2);color:var(--text-2);flex-shrink:0;transition:all 0.2s;
  }
  .opt-btn.correct-answer { border-color:var(--accent-bright);background:#22c88e0c; }
  .opt-btn.correct-answer .opt-letter { background:var(--accent-bright);color:white; }
  .opt-btn.wrong-answer { border-color:var(--red);background:var(--red-light); }
  .opt-btn.wrong-answer .opt-letter { background:var(--red);color:white; }
  .opt-btn.dimmed { opacity:0.35;pointer-events:none; }

  .explanation {
    margin-top:18px;padding:20px;border-radius:14px;font-size:13.5px;line-height:1.65;
    color:var(--text-2);animation:fadeUp 0.35s cubic-bezier(.4,0,.2,1);
    border:1px solid var(--surface-3);
  }
  .explanation.right { background:linear-gradient(135deg,#22c88e06 0%,#22c88e10 100%);border-color:#22c88e30; }
  .explanation.wrong { background:linear-gradient(135deg,#d9445206 0%,#d9445210 100%);border-color:#d9445230; }
  .explanation .result-label {
    font-weight:800;font-size:18px;color:var(--text);margin-bottom:4px;letter-spacing:-0.3px;
  }
  .explanation .result-sub { font-size:12px;color:var(--text-3);margin-bottom:14px;font-weight:500; }
  .explanation .exp-text { font-size:13.5px;line-height:1.7;color:var(--text-2); }

  .cvi-tag {
    display:flex;align-items:flex-start;gap:10px;font-family:'JetBrains Mono',monospace;
    font-size:10.5px;font-weight:500;letter-spacing:0.3px;color:var(--accent);
    background:var(--accent-light);padding:12px 14px;border-radius:10px;margin-top:16px;
    line-height:1.55;border:1px solid var(--accent-mid);
  }
  .cvi-tag::before { content:'⚡';font-size:14px;flex-shrink:0;margin-top:-1px; }

  .next-btn {
    width:100%;padding:15px;border:none;border-radius:12px;background:var(--text);color:white;
    font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;
    margin-top:18px;transition:all 0.2s;letter-spacing:0.2px;
  }
  .next-btn:hover { background:#2a2a32;transform:translateY(-1px);box-shadow:var(--shadow-md); }

  /* RESULTS */
  .results-card {
    background:transparent;border:none;border-radius:0;
    padding:36px 0;animation:fadeUp 0.5s cubic-bezier(.4,0,.2,1);
  }
  .results-card .res-eyebrow {
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:2.5px;
    text-transform:uppercase;color:var(--text-3);text-align:center;
  }
  .results-card .big-emoji { font-size:56px;text-align:center;margin:16px 0 4px; }
  .results-card .rank { font-size:22px;font-weight:700;text-align:center;margin:8px 0; }
  .results-card .rank-desc { color:var(--text-2);font-size:14.5px;line-height:1.6;text-align:center;margin-bottom:6px;font-weight:400; }

  .prize-won-box {
    background:transparent;
    border:none;border-radius:0;padding:20px 0;margin:20px 0;text-align:center;
    border-top:1px solid var(--surface-3);border-bottom:1px solid var(--surface-3);
  }
  .prize-won-box .pw-label {
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
    text-transform:uppercase;color:#b8860b;margin-bottom:8px;
  }
  .prize-won-box .pw-prize { font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px; }
  .prize-won-box .pw-desc { font-size:13px;color:var(--text-2);line-height:1.5; }

  .cta-box {
    background:transparent;border:none;border-radius:0;
    padding:20px 0;margin-top:20px;text-align:center;
  }
  .cta-box h4 { color:var(--accent);font-size:16px;font-weight:700;margin-bottom:6px; }
  .cta-box p { font-size:13.5px;color:var(--text-2);line-height:1.55; }

  .restart-btn {
    display:block;width:100%;margin-top:20px;padding:13px 24px;border:none;
    border-radius:12px;background:var(--text);color:white;font-family:'Outfit',sans-serif;
    font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;
  }
  .restart-btn:hover { background:#2a2a32; }

  .auto-next {
    text-align:center;margin-top:18px;font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--text-3);letter-spacing:0.5px;animation:fadeUp 0.3s ease;
  }
  .auto-next span { font-weight:700;color:var(--text-2); }

  .watch-screen { text-align:center;padding:24px 0;animation:fadeUp 0.45s cubic-bezier(.4,0,.2,1); }
  .watch-screen .watch-step {
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:2.5px;
    text-transform:uppercase;color:var(--text-3);margin-bottom:12px;
  }
  .watch-screen h2 { font-size:22px;font-weight:700;line-height:1.3;margin-bottom:6px; }
  .watch-screen .watch-sub { color:var(--text-2);font-size:14px;margin-bottom:20px;line-height:1.5; }
  .video-player-wrap {
    position:relative;width:100%;border-radius:14px;overflow:hidden;
    background:#000;margin-bottom:16px;cursor:pointer;
  }
  .video-player-wrap video {
    display:block;width:100%;max-height:70vh;object-fit:contain;background:#000;
  }
  .video-controls {
    position:absolute;bottom:0;left:0;right:0;
    display:flex;align-items:center;gap:10px;padding:10px 12px;
    background:linear-gradient(transparent,rgba(0,0,0,0.7));
    opacity:1;transition:opacity 0.3s;
  }
  .video-player-wrap.hide-controls .video-controls { opacity:0; }
  .video-player-wrap:hover .video-controls,
  .video-player-wrap.paused .video-controls { opacity:1; }
  .vid-play-btn {
    width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    transition:background 0.2s;backdrop-filter:blur(4px);
  }
  .vid-play-btn:hover { background:rgba(255,255,255,0.35); }
  .vid-play-btn svg { fill:white;width:12px;height:12px; }
  .vid-progress-wrap {
    flex:1;height:4px;background:rgba(255,255,255,0.25);border-radius:99px;overflow:hidden;cursor:pointer;
  }
  .vid-progress-bar {
    height:100%;width:0%;background:white;border-radius:99px;transition:width 0.15s linear;
  }
  .vid-time {
    font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,0.8);
    white-space:nowrap;flex-shrink:0;
  }
  .vid-pause-icon {
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;opacity:0;transition:opacity 0.25s;
  }
  .vid-pause-icon.show { opacity:1; }
  .vid-pause-icon div {
    width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,0.55);
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);
  }
  .vid-pause-icon svg { fill:white;width:22px;height:22px; }
  .video-ended-overlay {
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.7);color:white;animation:fadeUp 0.3s ease;
  }
  .video-ended-overlay .veo-text {
    font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.5px;opacity:0.9;
  }
  .video-ended-overlay .veo-count {
    font-size:32px;font-weight:700;margin-top:4px;
  }

  /* DEPTH SHOWCASE */
  .depth-showcase {
    margin:24px 0;border-radius:16px;overflow:hidden;
    border:1px solid var(--border);background:var(--surface);
  }
  .depth-header {
    padding:16px 20px 12px;background:var(--surface-2);
    border-bottom:1px solid var(--border);
  }
  .depth-header .depth-eyebrow {
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;
    text-transform:uppercase;color:var(--accent);margin-bottom:4px;font-weight:600;
  }
  .depth-header h4 {
    font-size:15px;font-weight:700;color:var(--text);line-height:1.4;
  }
  .depth-header p {
    font-size:12px;color:var(--text-3);margin-top:2px;line-height:1.45;
  }
  .depth-tabs {
    display:flex;border-bottom:1px solid var(--border);background:var(--surface-2);
  }
  .depth-tab {
    flex:1;padding:10px 16px;border:none;background:transparent;
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    letter-spacing:0.5px;color:var(--text-3);cursor:pointer;
    transition:all 0.2s;text-align:center;position:relative;
  }
  .depth-tab::after {
    content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;
    background:var(--accent);border-radius:2px 2px 0 0;opacity:0;transition:opacity 0.2s;
  }
  .depth-tab:hover { color:var(--text-2); }
  .depth-tab.active { color:var(--accent); }
  .depth-tab.active::after { opacity:1; }
  .depth-tab .tab-icon { margin-right:6px;font-style:normal; }
  .depth-content {
    max-height:220px;overflow-y:auto;padding:16px 20px;
    scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent;
  }
  .depth-content::-webkit-scrollbar { width:5px; }
  .depth-content::-webkit-scrollbar-track { background:transparent; }
  .depth-content::-webkit-scrollbar-thumb { background:var(--surface-3);border-radius:99px; }
  .depth-content::-webkit-scrollbar-thumb:hover { background:var(--border); }
  .depth-pane { display:none;animation:fadeUp 0.3s ease; }
  .depth-pane.active { display:block; }
  .depth-pane p {
    font-size:13px;line-height:1.75;color:var(--text-2);
  }
  .depth-pane .signal-count {
    display:inline-flex;align-items:center;gap:5px;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;
    color:var(--accent);background:var(--accent-light);
    padding:4px 10px;border-radius:99px;margin-bottom:12px;
    border:1px solid var(--accent-mid);
  }

  .hidden { display:none !important; }

  /* Small phones (375px and below) */
  @media (max-width:400px) {
    .container { padding:16px; }
    .global-logo { padding:20px 0 0; }
    .logo { height:32px; }
    .header { padding:16px 0 20px; }
    .header h1 { font-size:28px; }
    .header p { font-size:14px; }
    .track-btn { padding:18px 14px; }
    .track-btn .emoji { font-size:26px; }
    .track-btn .label { font-size:15px; }
    .q-card h3 { font-size:15.5px; }
    .opt-btn { padding:12px 14px;font-size:13.5px; }
    .opt-letter { width:26px;height:26px;font-size:10px; }
    .explanation .result-label { font-size:16px; }
    .explanation { padding:16px; }
    .cvi-tag { font-size:9.5px;padding:10px 12px; }
    .results-card .big-emoji { font-size:48px; }
    .results-card .rank { font-size:20px; }
    .results-card .rank-desc { font-size:13.5px; }
    .prize-won-box .pw-prize { font-size:16px; }
  }

  /* Tablets / iPads (768px+) */
  @media (min-width:600px) {
    .container { max-width:580px;padding:32px 40px; }
    .global-logo { padding:36px 0 0; }
    .logo { height:48px; }
    .header { padding:28px 0 32px; }
    .header h1 { font-size:40px; }
    .header p { font-size:16px;max-width:400px; }
    .track-btn { padding:26px 20px; }
    .track-btn .emoji { font-size:34px; }
    .track-btn .label { font-size:18px; }
    .track-btn .sub { font-size:13px; }
    .rules-box h4 { font-size:15px; }
    .prize-row { font-size:14px;padding:12px 0; }
    .prize-emoji { font-size:20px; }
    .progress-pip { height:6px; }
    .streak-pill { font-size:13px;padding:6px 14px; }
    .q-card h3 { font-size:19px; }
    .video-link-box { padding:16px 18px; }
    .video-link-text .vlt-title { font-size:15px; }
    .opt-btn { padding:16px 18px;font-size:15.5px;border-radius:14px; }
    .opt-letter { width:34px;height:34px;font-size:12px;border-radius:10px; }
    .explanation { padding:24px; }
    .explanation .result-label { font-size:20px; }
    .explanation .exp-text { font-size:14.5px; }
    .cvi-tag { font-size:11px;padding:14px 16px; }
    .next-btn { padding:17px;font-size:16px;border-radius:14px; }
    .results-card { padding:48px 0; }
    .results-card .big-emoji { font-size:64px; }
    .results-card .rank { font-size:26px; }
    .results-card .rank-desc { font-size:16px; }
    .prize-won-box { padding:24px 0; }
    .prize-won-box .pw-prize { font-size:20px; }
    .prize-won-box .pw-desc { font-size:14px; }
    .cta-box h4 { font-size:18px; }
    .cta-box p { font-size:14.5px; }
    .restart-btn { padding:15px 28px;font-size:15px;border-radius:14px; }
  }

  /* Large tablets / landscape iPad (1024px+) */
  @media (min-width:1024px) {
    .container { max-width:640px;padding:40px 48px; }
    .header h1 { font-size:44px; }
    .logo { height:52px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="global-logo"><img src="convotrack_logo.png" alt="ConvoTrack by Convosight" class="logo"></div>

  <div id="landing">
    <div class="header">
      <h1>Crack the <span class="green">Case</span></h1>
      <p>Watch one real influencer video. Answer 3 questions about what you saw. One wrong answer and the game is over — how far can you go?</p>
    </div>
    <div class="track-select" style="justify-content:center;">
      <button class="track-btn" onclick="startGame()" style="flex:none;width:100%;">
        <span class="emoji">🎯</span>
        <span class="label">Start the Challenge</span>
        <br>
        <span class="sub">1 video · 3 questions · 2 min</span>
      </button>
    </div>

      {difficulty:3,question:"She applies a serum to her face using a pink electronic device. Which serum brand is it?",options:["TATCHA Dewy Skin Cream","medicube Deep Cleansing Foam","Bionymph Youth Serum","Centella Red Serum"],correct:2,explanation:"She applies Bionymph Youth Serum using a pink electronic device (medicube Booster Pro). CVI's multi-object tracking distinguished the serum bottle from the application device, correctly attributing the product to Bionymph and the tool to medicube — two different brands used together in a single step.",cvi_insight:"CVI: Multi-object tracking separated serum brand (Bionymph) from device brand (medicube) in single application step"}
    ],
    audio: "Night routine",
    video: "The video showcases a woman in a bathroom setting, demonstrating her extensive night-time beauty and personal care routine. Initially, she's wearing a beige tank top and black shorts, using a body brush and wooden roller on her skin. The scene transitions to close-ups of various products, including a green stick, eye patches, and a bottle of Bionymph Youth Serum, which she applies to her face using a pink device. She then uses hair oil and a scalp massager. The video transitions to the shower, where she uses Dr. Groot shampoo, conditioner, and a scalp revitalizing solution. She washes her hair and face, then applies a white face mask. While the mask sets, she brushes her teeth with toothpaste. The video continues with her rinsing her mouth with mouthwash, applying a lip mask, and washing off the face mask. She uses a soapy sponge to wash her body, followed by Dove exfoliating body polish and shaving her underarms and arms with shaving cream and a razor. After the shower, she applies Centella Red Serum and Torriden serum to her face, followed by eye patches and a facial massage tool. She finishes by applying a pink face mask, hair oil, and body lotion, demonstrating each step in detail."
  }
];

function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}

let autoTimer=null;
function autoAdvance(fn){
  let sec=5;
  const el=document.getElementById('countdown');
  autoTimer=setInterval(()=>{
    sec--;
    if(el)el.textContent=sec;
    if(sec<=0){clearInterval(autoTimer);autoTimer=null;fn();}
  },1000);
}

let activeVideo=null,currentQ=0,streak=0,gameOver=false;

function startGame(){
  activeVideo=pickRandom(VIDEOS);
  currentQ=0;streak=0;gameOver=false;
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('videoScreen').classList.remove('hidden');
  renderVideoScreen();
}

function fmtTime(s){
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function renderVideoScreen(){
  const v=activeVideo,area=document.getElementById('videoArea');
  area.innerHTML=`<div class="watch-screen">
    <div class="watch-step">Step 1 of 2</div>
    <h2>Watch the Video</h2>
    <p class="watch-sub">Watch carefully — you'll answer 3 questions about what you see.</p>
    <div class="video-player-wrap" id="vidWrap">
      <video id="quizVideo" playsinline></video>
      <div class="vid-pause-icon" id="vidPauseIcon">
        <div><svg viewBox="0 0 24 24"><polygon points="8,5 20,12 8,19"/></svg></div>
      </div>
      <div class="video-controls">
        <button class="vid-play-btn" id="vidPlayBtn">
          <svg id="vidPlayIcon" viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
        </button>
        <div class="vid-progress-wrap" id="vidProgressWrap">
          <div class="vid-progress-bar" id="vidProgressBar"></div>
        </div>
        <span class="vid-time" id="vidTime">0:00 / 0:00</span>
      </div>
    </div>
  </div>`;

  const vid=document.getElementById('quizVideo');
  const wrap=document.getElementById('vidWrap');
  const playBtn=document.getElementById('vidPlayBtn');
  const playIcon=document.getElementById('vidPlayIcon');
  const pauseIcon=document.getElementById('vidPauseIcon');
  const progBar=document.getElementById('vidProgressBar');
  const progWrap=document.getElementById('vidProgressWrap');
  const timeEl=document.getElementById('vidTime');
  const pauseSvg='<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
  const playSvg='<polygon points="8,5 20,12 8,19"/>';
  let hideTimer=null;

  vid.src=v.id+'.mp4';
  vid.load();
  vid.playbackRate=1.2;
  vid.muted=false;
  vid.play().catch(()=>{vid.muted=true;vid.play();});

  function scheduleHide(){
    clearTimeout(hideTimer);
    wrap.classList.remove('hide-controls');
    hideTimer=setTimeout(()=>{if(!vid.paused)wrap.classList.add('hide-controls');},2500);
  }
  scheduleHide();

  function togglePlay(e){
    e.stopPropagation();
    if(vid.paused) vid.play(); else vid.pause();
  }

  vid.addEventListener('click',togglePlay);
  playBtn.addEventListener('click',togglePlay);

  vid.addEventListener('play',()=>{
    playIcon.innerHTML=pauseSvg;
    pauseIcon.querySelector('svg').innerHTML=pauseSvg;
    pauseIcon.classList.add('show');
    setTimeout(()=>pauseIcon.classList.remove('show'),400);
    wrap.classList.remove('paused');
    scheduleHide();
  });

  vid.addEventListener('pause',()=>{
    playIcon.innerHTML=playSvg;
    pauseIcon.querySelector('svg').innerHTML=playSvg;
    pauseIcon.classList.add('show');
    wrap.classList.add('paused');
    wrap.classList.remove('hide-controls');
    clearTimeout(hideTimer);
  });

  wrap.addEventListener('mousemove',scheduleHide);
  wrap.addEventListener('touchstart',scheduleHide,{passive:true});

  vid.addEventListener('timeupdate',()=>{
    if(vid.duration){
      progBar.style.width=(vid.currentTime/vid.duration*100)+'%';
      timeEl.textContent=fmtTime(vid.currentTime)+' / '+fmtTime(vid.duration);
    }
  });

  progWrap.addEventListener('click',(e)=>{
    e.stopPropagation();
    const rect=progWrap.getBoundingClientRect();
    vid.currentTime=((e.clientX-rect.left)/rect.width)*vid.duration;
  });

  vid.addEventListener('ended',function onEnd(){
    vid.removeEventListener('ended',onEnd);
    const overlay=document.createElement('div');
    overlay.className='video-ended-overlay';
    overlay.innerHTML='<div class="veo-text">Starting quiz in</div><div class="veo-count" id="vidCountdown">2</div>';
    wrap.appendChild(overlay);
    let sec=2;
    const iv=setInterval(()=>{
      sec--;
      const el=document.getElementById('vidCountdown');
      if(el)el.textContent=sec;
      if(sec<=0){clearInterval(iv);startQuestions();}
    },1000);
  });
}

function startQuestions(){
  const vid=document.getElementById('quizVideo');
  if(vid){vid.pause();vid.src='';}
  document.getElementById('videoScreen').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  renderProgress();renderQuestion();
}

function renderProgress(){
  const bar=document.getElementById('progressBar');bar.innerHTML='';
  for(let i=0;i<3;i++){
    const p=document.createElement('div');p.className='progress-pip';
    if(i<currentQ&&i<streak) p.classList.add('done');
    else if(i===currentQ&&gameOver) p.classList.add('wrong');
    else if(i===currentQ&&!gameOver) p.classList.add('active');
    bar.appendChild(p);
  }
  document.getElementById('streakPill').textContent=`🔥 ${streak} / 3`;
}

function renderQuestion(){
  const q=activeVideo.questions[currentQ],area=document.getElementById('questionArea'),L=['A','B','C','D'];
  let dots='';for(let i=0;i<3;i++)dots+=`<span class="${i<q.difficulty?'on':''}"></span>`;
  area.innerHTML=`<div class="q-card"><div class="q-meta"><div class="q-num">QUESTION ${currentQ+1} / 3</div><div class="diff-pills">${dots}</div></div><h3>${q.question}</h3><div class="options">${q.options.map((o,i)=>`<button class="opt-btn" onclick="answer(${i})"><span class="opt-letter">${L[i]}</span><span>${o}</span></button>`).join('')}</div><div id="feedback"></div></div>`;
}

function answer(idx){
  const q=activeVideo.questions[currentQ],ok=idx===q.correct;

  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.classList.add('answered');b.style.pointerEvents='none';
    if(i===q.correct)b.classList.add('correct-answer');
    else if(i===idx&&!ok)b.classList.add('wrong-answer');
    else b.classList.add('dimmed');
  });

  if(ok){
    streak++;
    renderProgress();
    const isLast=currentQ>=2;
    if(isLast){
      document.getElementById('feedback').innerHTML=`<div class="explanation right"><div class="result-label">✅ Correct!</div><div class="result-sub">Streak: ${streak} of 3 — Perfect!</div><div class="exp-text">${q.explanation}</div><div class="cvi-tag">${q.cvi_insight}</div></div><div class="auto-next">Showing your prize in <span id="countdown">5</span>s...</div>`;
      autoAdvance(showResults);
    } else {
      document.getElementById('feedback').innerHTML=`<div class="explanation right"><div class="result-label">✅ Correct!</div><div class="result-sub">Streak: ${streak} of 3</div><div class="exp-text">${q.explanation}</div><div class="cvi-tag">${q.cvi_insight}</div></div><button class="next-btn" onclick="nextQuestion()">Next Question →</button>`;
    }
  } else {
    gameOver=true;
    renderProgress();
    document.getElementById('feedback').innerHTML=`<div class="explanation wrong"><div class="result-label">❌ Game Over!</div><div class="result-sub">You cleared ${streak} of 3 questions</div><div class="exp-text">${q.explanation}</div><div class="cvi-tag">${q.cvi_insight}</div></div><div class="auto-next">Showing your prize in <span id="countdown">5</span>s...</div>`;
    autoAdvance(showResults);
  }
}

function nextQuestion(){
  currentQ++;
  if(currentQ>=3) showResults();
  else { renderProgress();renderQuestion(); }
}

function showResults(){
  document.getElementById('game').classList.add('hidden');
  const r=document.getElementById('results');r.classList.remove('hidden');
  const p=PRIZES[streak];

  let rankTitle;
  if(streak===3) rankTitle="Perfect Detective";
  else if(streak===2) rankTitle="Sharp Observer";
  else if(streak===1) rankTitle="First Clue Found";
  else rankTitle="Case Cold";

  const audioText=activeVideo.audio||'';
  const videoText=activeVideo.video||'';
  const audioWords=audioText.split(/\s+/).filter(Boolean).length;
  const videoWords=videoText.split(/\s+/).filter(Boolean).length;

  r.innerHTML=`<div class="results-card">
    <div class="res-eyebrow">Crack the Case</div>
    <div class="big-emoji">${p.emoji}</div>
    <div class="rank">${rankTitle}</div>
    <div class="rank-desc">You cleared ${streak} of 3 questions${streak<3?' before getting caught':' — flawless run'}!</div>

    <div class="depth-showcase">
      <div class="depth-header">
        <div class="depth-eyebrow">⚡ Capture 10X more signals</div>
        <h4>From one video, our visual intelligence engine extracted:</h4>
        <p>${audioWords + videoWords} words of structured signal — audio transcript + visual scene description</p>
      </div>
      <div class="depth-tabs">
        <button class="depth-tab active" onclick="switchDepthTab(this,'audio')">
          <em class="tab-icon">🎙</em>Audio Transcript
        </button>
        <button class="depth-tab" onclick="switchDepthTab(this,'video')">
          <em class="tab-icon">👁</em>Visual Description
        </button>
      </div>
      <div class="depth-content">
        <div class="depth-pane active" data-pane="audio">
          <div class="signal-count">🎙 ${audioWords} words captured</div>
          <p>${audioText}</p>
        </div>
        <div class="depth-pane" data-pane="video">
          <div class="signal-count">👁 ${videoWords} words captured</div>
          <p>${videoText}</p>
        </div>
      </div>
    </div>

    <div class="prize-won-box">
      <div class="pw-label">🎁 Your Prize</div>
      <div class="pw-prize">${streak===0?'Better luck next time!':p.name}</div>
      <div class="pw-desc">${p.desc}</div>
    </div>

    <div class="cta-box">
      <h4>Convosight Visual Intelligence</h4>
      <p>Our visual insights engine decodes billions of signals from videos to uncover the hidden, unspoken insights that text and audio alone can't capture.</p>
    </div>
    <button class="restart-btn" onclick="restart()">Play Again →</button>
  </div>`;
}

function switchDepthTab(btn,pane){
  btn.closest('.depth-showcase').querySelectorAll('.depth-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.depth-showcase').querySelectorAll('.depth-pane').forEach(p=>{
    p.classList.toggle('active',p.dataset.pane===pane);
  });
}

function restart(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;}
  document.getElementById('results').classList.add('hidden');
  document.getElementById('game').classList.add('hidden');
  document.getElementById('videoScreen').classList.add('hidden');
  document.getElementById('landing').classList.remove('hidden');
  currentQ=0;streak=0;gameOver=false;
}
</script>
</body>
</html>
